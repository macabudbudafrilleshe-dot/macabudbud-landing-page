<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Sign Up</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <a href="login.html" class="login-box">Login</a>

    <section class="hero">
      <h1>Sign Up</h1>

      <div class="content">
        <form id="signupForm">
          <input
            type="text"
            id="signupName"
            placeholder="Full Name"
          /><br /><br />
          <input
            type="email"
            id="signupEmail"
            placeholder="Email"
          /><br /><br />
          <input
            type="password"
            id="signupPassword"
            placeholder="Password"
          /><br /><br />
          <input
            type="password"
            id="signupConfirm"
            placeholder="Confirm Password"
          /><br /><br />
          <button type="submit">Create Account</button>
        </form>

        <p>
          Already have an account?
          <a href="login.html">Login</a>
        </p>
      </div>
    </section>

    <script src="script.js"></script>
  </body>
</html>
