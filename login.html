<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <a href="index.html" class="login-box">Home</a>

    <section class="hero">
      <h1>Login</h1>

      <div class="content">
        <form id="loginForm">
          <input type="email" id="loginEmail" placeholder="Email" /><br /><br />
          <input
            type="password"
            id="loginPassword"
            placeholder="Password"
          /><br /><br />
          <button type="submit">Login</button>
        </form>

        <p>
          Don't have an account?
          <a href="signup.html">Sign up</a>
        </p>
      </div>
    </section>

    <script src="script.js"></script>
  </body>
</html>
